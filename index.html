<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ISM إسماعيلية</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{ --bg:#EEF2F7;--card:#fff;--navy:#1A3A5C;--blue:#2563EB;--green:#16A34A;--red:#DC2626;--gray:#64748B;--border:#E2E8F0;--sub:#94A3B8;--txt:#1E293B; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:var(--txt);direction:rtl;min-height:100vh}
nav{background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.n-brand{display:flex;align-items:center;gap:10px}.n-logo{width:34px;height:34px;background:var(--blue);border-radius:8px;display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff}
.n-title{color:#fff;font-size:14px;font-weight:800}.n-right{display:flex;gap:7px;align-items:center}
.sync-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:#FCD34D;animation:blink 2s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.icbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;display:grid;place-items:center}
.tabs{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;padding:0 8px;position:sticky;top:56px;z-index:90}
.tab{padding:12px 14px;font-size:12px;font-weight:700;color:var(--gray);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.main{padding:12px;max-width:1100px;margin:0 auto;padding-bottom:84px}
.page{display:none}.page.on{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:15px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kv{font-size:21px;font-weight:900;color:var(--blue)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:11px}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--gray);padding:8px;background:#F8FAFC;border-bottom:2px solid var(--border)}
td{font-size:12px;padding:10px;border-bottom:1px solid rgba(226,232,240,.5);text-align:center}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg input{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:10px;width:100%}
.btn{background:var(--blue);color:#fff;width:100%;border:none;padding:12px;border-radius:9px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<nav>
  <div class="n-brand"><div class="n-logo">ISM</div><div class="n-title">ISM إسماعيلية</div></div>
  <div class="n-right">
    <div class="sync-badge"><div class="sdot" id="sdot"></div><span id="stxt">جاري...</span></div>
    <div class="icbtn" onclick="loadData()">⟳</div>
  </div>
</nav>

<div class="tabs">
  <div class="tab on" onclick="ST('overview',this)">🏠 الرئيسية</div>
  <div class="tab" onclick="ST('settings',this)">⚙️ الإعدادات</div>
</div>

<div class="main">
  <div class="page on" id="tab-overview">
    <div class="kpi-row" id="ovKPIs"></div>
    <div class="card">
      <div class="tw"><table><thead><tr><th>المندوب</th><th>التارجت</th><th>المحقق</th><th>%</th></tr></thead><tbody id="ovTbl"></tbody></table></div>
    </div>
  </div>

  <div class="page" id="tab-settings">
    <div class="card" style="padding:15px">
      <div class="fg"><label>رابط Apps Script الحالي:</label>
      <input id="urlInput" value="https://script.google.com/macros/s/AKfycbw0lMxw62s85yNcgGQRMxa9BwIfLTDfk0jOGsV6O27-BYdxyp6JU8ZV1Z3gcxX-0tB9/exec"></div>
      <button class="btn" onclick="saveSettings()">💾 تحديث الرابط وحفظ</button>
    </div>
  </div>
</div>

<script>
// --- الرابط اللي بعته ---
let SHEET_URL = 'https://script.google.com/macros/s/AKfycbw0lMxw62s85yNcgGQRMxa9BwIfLTDfk0jOGsV6O27-BYdxyp6JU8ZV1Z3gcxX-0tB9/exec';

// استرجاع الرابط من الذاكرة لو موجود
const savedUrl = localStorage.getItem('ism_url');
if(savedUrl) {
    SHEET_URL = savedUrl;
    document.getElementById('urlInput').value = savedUrl;
}

const REPS = [
  {"region": "الافرنجي", "rep": "طارق عبدالفتاح", "target": 885000},
  {"region": "التل", "rep": "إسلام الضو", "target": 900000},
  {"region": "التمليك", "rep": "أحمد حسن", "target": 725000},
  {"region": "الشيخ زايد", "rep": "مروان عماد", "target": 1000000},
  {"region": "العريشية", "rep": "سيد عادل", "target": 800000},
  {"region": "القنطرة", "rep": "سامى محمد", "target": 935000},
  {"region": "فايد", "rep": "عبدالرحمن عادل", "target": 990000}
];

async function loadData(){
  setSS('load');
  try {
    const r = await fetch(SHEET_URL + '?action=get');
    if (!r.ok) throw new Error('404'); // لو الرابط ميت
    const j = await r.json();
    if(j.status === 'ok'){
      render(j.sales || []);
      setSS('ok');
    }
  } catch(e) { 
    setSS('er'); 
    alert("عذراً: الرابط الحالي غير صحيح (404). تأكد من 'نشر' السكريبت في جوجل واختيار Anyone.");
  }
}

function render(sales){
  const sOf = r => sales.reduce((s,d)=>s+(+d[r]||0),0);
  const tAch = REPS.reduce((s,r)=>s+sOf(r.region),0);
  
  document.getElementById('ovKPIs').innerHTML = `<div class="kpi"><div class="kv">${tAch.toLocaleString('ar-EG')}</div><div>إجمالي المحقق</div></div>`;
  document.getElementById('ovTbl').innerHTML = REPS.map(r=>{
    const a = sOf(r.region);
    return `<tr><td>${r.rep}</td><td>${r.target.toLocaleString()}</td><td>${a.toLocaleString()}</td><td>${((a/r.target)*100).toFixed(1)}%</td></tr>`;
  }).join('');
}

function ST(n, e){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+n).classList.add('on'); e.classList.add('on');
}

function setSS(s){
  const d=document.getElementById('sdot'), t=document.getElementById('stxt');
  if(s==='ok'){ d.style.background='#4ADE80'; t.textContent='متصل'; }
  else if(s==='load'){ d.style.background='#FCD34D'; t.textContent='جاري...'; }
  else { d.style.background='#F87171'; t.textContent='خطأ 404'; }
}

function saveSettings(){
  const val = document.getElementById('urlInput').value;
  if(val) { localStorage.setItem('ism_url', val); location.reload(); }
}

loadData();
</script>
</body>
</html>
